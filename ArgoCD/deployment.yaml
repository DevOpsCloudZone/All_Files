
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydeployment
  labels:
    env: pre-prod
spec:
  replicas: 6
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name : myapplication
          image: nginx
          ports:
            - containerPort: 80
